<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - PNJ 1305</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        * { font-family: "Segoe UI", sans-serif; }
        body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 400px;
            max-width: 95vw;
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #0ea5e9, #0369a1);
            color: #fff;
            padding: 28px 32px 20px;
            text-align: center;
        }
        .login-header h4 { margin: 0; font-weight: 700; font-size: 1.2rem; }
        .login-header p { margin: 4px 0 0; font-size: 0.85rem; opacity: 0.85; }
        .login-body { padding: 28px 32px 32px; }
        .form-floating { margin-bottom: 16px; }
        .form-floating .form-control {
            border-radius: 8px;
            border: 1.5px solid #e2e8f0;
            font-size: 0.95rem;
        }
        .form-floating .form-control:focus {
            border-color: #0ea5e9;
            box-shadow: 0 0 0 3px rgba(14,165,233,0.15);
        }
        .btn-login {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            background: linear-gradient(135deg, #0ea5e9, #0369a1);
            border: none;
            color: #fff;
            transition: all 0.2s;
        }
        .btn-login:hover { background: linear-gradient(135deg, #0369a1, #024a75); color: #fff; }
        .alert-danger {
            border-radius: 8px;
            font-size: 0.85rem;
            padding: 10px 14px;
        }
        .remember-row {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: #64748b;
        }
        .logo-text {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div class="logo-text">PNJ 1305</div>
            <p>Phiếu xác nhận chuyển khoản</p>
        </div>
        <div class="login-body">
            {% if error %}
            <div class="alert alert-danger">
                <i class="bi bi-exclamation-circle"></i> {{ error }}
            </div>
            {% endif %}
            <form method="POST" action="/login">
                <div class="form-floating">
                    <input type="text" class="form-control" id="username" name="username"
                           placeholder="Tên đăng nhập" required autofocus>
                    <label for="username"><i class="bi bi-person"></i> Tên đăng nhập</label>
                </div>
                <div class="form-floating">
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Mật khẩu" required>
                    <label for="password"><i class="bi bi-lock"></i> Mật khẩu</label>
                </div>
                <div class="remember-row">
                    <input type="checkbox" class="form-check-input me-2" id="remember"
                           name="remember" value="1" checked>
                    <label for="remember">Ghi nhớ đăng nhập (30 ngày)</label>
                </div>
                <button type="submit" class="btn btn-login">
                    <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
                </button>
            </form>
        </div>
    </div>
</body>
</html>
